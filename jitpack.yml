jdk:
  - openjdk21
install:
  - echo "Configuring Git"
  - git --version
  - git config --global user.email "no-reply@jitpack.io"
  - git config --global user.name "Jitpack build"
  - echo "Creating safer git wrapper..."
  - mkdir -p $HOME/bin
  - |
    cat > $HOME/bin/git << 'EOF'
    #!/bin/sh
    exec /usr/bin/git "$@"
    EOF
  - chmod +x $HOME/bin/git
  - export PATH=$HOME/bin:$PATH
  - which git
  - git --version
  - echo "Applying single file patches"
  - ./gradlew applyPaperSingleFilePatches --stacktrace --no-daemon
  - echo "Applying paper API patches"
  - ./gradlew applyPaperApiPatches --stacktrace --no-daemon
  - echo "Publishing to Maven local"
  - ./gradlew :spout-api:publishToMavenLocal --stacktrace --no-daemon
