jdk:
  - openjdk21
before_install:
  - echo "Installing newer Git..."
  - wget https://example.com/git-static-linux-amd64.tar.gz
  - tar -xzf git-static-linux-amd64.tar.gz
  - export PATH=$PWD/git/bin:$PATH
  - git --version
install:
  - echo "Configuring Git"
  - git --version
  - git config --global user.email "no-reply@jitpack.io"
  - git config --global user.name "Jitpack build"
  - echo "Applying single file patches"
  - ./gradlew applyPaperSingleFilePatches --stacktrace
  - echo "Applying paper API patches"
  - ./gradlew applyPaperApiPatches --stacktrace
  - echo "Publishing to Maven local"
  - ./gradlew :spout-api:publishToMavenLocal --stacktrace
